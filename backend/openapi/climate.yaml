openapi: 3.1.0
info:
  title: RH Corporativo - Clima e Comunicação
  version: 1.0.0
  description: Timeline social, Kudos limitados, pesquisa de pulso anônima e sentimento agregado.
servers:
  - url: /api
security:
  - bearerAuth: []
paths:
  /clima/dashboard:
    get:
      summary: Retorna mural, saldo, pesquisa ativa e agregados com k-anonimato
      parameters:
        - { name: limite, in: query, schema: { type: integer, minimum: 5, maximum: 50, default: 20 } }
        - { name: cursor, in: query, schema: { type: integer } }
      responses:
        '200': { description: Snapshot paginado do portal. }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /clima/pessoas:
    get:
      summary: Busca prefixada para autocomplete de menções
      parameters:
        - { name: busca, in: query, schema: { type: string, maxLength: 80 } }
      responses:
        '200': { description: Até oito colaboradores ativos, excluindo o usuário atual. }
  /clima/publicacoes:
    post:
      summary: Cria publicação ou Kudos de forma idempotente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tipo, conteudo, idempotencia]
              properties:
                tipo: { type: string, enum: [PUBLICACAO, KUDOS] }
                conteudo: { type: string, minLength: 1, maxLength: 4000 }
                destinatarioId: { type: integer }
                categoriaKudos: { type: string, enum: [COLABORACAO, INOVACAO, ATITUDE_CLIENTE, LIDERANCA, ESPIRITO_EQUIPE] }
                mencionadosIds: { type: array, maxItems: 20, items: { type: integer } }
                idempotencia: { type: string, format: uuid }
      responses:
        '201': { description: Publicação criada; Kudos debitado na mesma transação. }
        '409': { description: Saldo esgotado ou tentativa de autoelogio. }
  /clima/publicacoes/{publicacaoId}/curtida:
    post:
      summary: Alterna a curtida do colaborador autenticado
      parameters:
        - { name: publicacaoId, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: Estado e total atualizados. }
  /clima/publicacoes/{publicacaoId}/comentarios:
    post:
      summary: Adiciona comentário com menções e análise de sentimento
      parameters:
        - { name: publicacaoId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conteudo]
              properties:
                conteudo: { type: string, minLength: 1, maxLength: 1500 }
                mencionadosIds: { type: array, maxItems: 20, items: { type: integer } }
      responses:
        '201': { description: Comentário criado. }
  /clima/pesquisas/{pesquisaId}/credencial:
    post:
      summary: Emite credencial de voto sem persistir seu nonce junto da identidade
      parameters:
        - { name: pesquisaId, in: path, required: true, schema: { type: integer } }
      responses:
        '201':
          description: JWT de cédula com pesquisa, departamento e nonce; nunca contém usuário.
        '409': { description: Comprovante HMAC de participação já existente. }
  /clima/enps/votos:
    post:
      security: []
      summary: Consome a credencial e grava voto sem identificador de usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [credencial, nota]
              properties:
                credencial: { type: string, description: Cédula assinada de curta duração. }
                nota: { type: integer, minimum: 0, maximum: 10 }
                feedback: { type: string, maxLength: 2000 }
      responses:
        '202': { description: Voto isolado aceito; feedback sanitizado e cifrado em AES-256-GCM. }
        '401': { description: Credencial inválida ou expirada. }
        '409': { description: Credencial já consumida ou pesquisa encerrada. }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  responses:
    Unauthorized: { description: Token JWT ausente ou inválido. }
