openapi: 3.1.0
info:
  title: RH Corporativo — Flexible Benefits & Expenses API
  version: 1.0.0
servers:
  - url: http://localhost:3333
paths:
  /flex-benefits/dashboard:
    get:
      summary: Carteira, limites, extrato de cartão e reembolsos
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: colaboradorId, in: query, schema: { type: integer } }
        - { name: competencia, in: query, schema: { type: string, format: date } }
      responses:
        '200': { description: Portal financeiro consolidado }
  /flex-benefits/carteiras/{carteiraId}/distribuicao:
    put:
      summary: Distribui o saldo com lock, versão e idempotência
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: carteiraId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [versao, idempotencia, alocacoes]
              properties:
                versao: { type: integer, minimum: 1 }
                idempotencia: { type: string, format: uuid }
                alocacoes:
                  type: array
                  items:
                    type: object
                    required: [categoria, valorCentavos]
                    properties:
                      categoria: { enum: [VALE_REFEICAO, MOBILIDADE, SAUDE, EDUCACAO] }
                      valorCentavos: { type: integer, minimum: 0 }
      responses:
        '200': { description: Distribuição confirmada }
        '409': { description: Overspend, conflito de versão ou idempotência }
  /flex-benefits/reembolsos:
    post:
      summary: Processa comprovante criptografado, OCR e cria a esteira de aprovação
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [comprovante, colaboradorId, descricao, valorCentavos, idempotencia]
              properties:
                comprovante: { type: string, format: binary }
                colaboradorId: { type: integer }
                transacaoCartaoId: { type: integer }
                categoria: { type: string }
                descricao: { type: string }
                valorCentavos: { type: integer }
                idempotencia: { type: string, format: uuid }
      responses:
        '201': { description: Reembolso criado }
        '422': { description: Valor não corresponde à transação selecionada }
  /flex-benefits/reembolsos/{reembolsoId}/decisao:
    post:
      summary: Decide o nível atual conforme a alçada do usuário
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: reembolsoId, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: Decisão registrada e próximo nível calculado }
        '403': { description: Usuário sem alçada }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
