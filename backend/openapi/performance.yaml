openapi: 3.1.0
info:
  title: RH Corporativo — Performance & Succession API
  version: 1.0.0
servers:
  - url: http://localhost:3333
paths:
  /performance/dashboard:
    get:
      summary: Retorna ciclos, filtros, talentos Nine-Box, OKRs e calibrações
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: cicloId, in: query, schema: { type: integer } }
        - { name: departamentoId, in: query, schema: { type: integer } }
      responses:
        '200': { description: Dashboard consolidado }
        '401': { description: Token ausente ou inválido }
  /performance/ciclos/{cicloId}/recalcular:
    post:
      summary: Recalcula os eixos da Nine-Box pelas avaliações 360 concluídas
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: cicloId, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: Recálculo concluído }
  /performance/resultados/{resultadoId}/calibrar:
    post:
      summary: Calibra um talento com lock otimista e registro de auditoria
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: resultadoId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quadranteX, quadranteY, justificativa, versao]
              properties:
                quadranteX: { type: integer, minimum: 1, maximum: 3 }
                quadranteY: { type: integer, minimum: 1, maximum: 3 }
                justificativa: { type: string, minLength: 10, maxLength: 2000 }
                versao: { type: integer, minimum: 1 }
      responses:
        '200': { description: Calibração salva }
        '409': { description: Conflito de versão }
  /performance/okrs/{okrId}/progresso:
    patch:
      summary: Atualiza um KR folha e recalcula sua cadeia de pais
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: okrId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [valorAtual, versao]
              properties:
                valorAtual: { type: number }
                versao: { type: integer, minimum: 1 }
      responses:
        '200': { description: Cadeia recalculada }
        '409': { description: Conflito de versão }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
