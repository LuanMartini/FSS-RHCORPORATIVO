services:
  postgres:
    image: postgres:16-alpine
    container_name: rhcorp-postgres
    environment:
      POSTGRES_DB: rhcorp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - rhcorp_pgdata:/var/lib/postgresql/data

volumes:
  rhcorp_pgdata:
